services:
  simsat-sim:
    build:
      context: ./simsat
      dockerfile: Dockerfile.dashboard
    ports:
      - "8000:8000"
    environment:
      - MAPBOX_ACCESS_TOKEN=${MAPBOX_ACCESS_TOKEN}
      - DJANGO_DEBUG=1
      - DJANGO_SECRET_KEY=dev-secret-key
    volumes:
      - dashboard_db:/app
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/api/telemetry/recent/\")'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  simsat-api:
    build:
      context: ./simsat
      dockerfile: Dockerfile.sim
    ports:
      - "9005:8000"
    environment:
      - DASHBOARD_URL=http://simsat-sim:8000
      - MAPBOX_ACCESS_TOKEN=${MAPBOX_ACCESS_TOKEN}
    depends_on:
      simsat-sim:
        condition: service_healthy

  inference:
    build: ./inference
    ports:
      - "8002:8002"
    environment:
      - HF_MODEL_PATH=${HF_MODEL_PATH:-LiquidAI/LFM2.5-VL-1.6B}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - hf_cache:/root/.cache/huggingface

  monitor:
    build: ./monitor
    ports:
      - "8001:8001"
    environment:
      - SIMSAT_API_URL=http://simsat-api:9005
      - INFERENCE_URL=http://inference:8002
    depends_on:
      - simsat-api
      - inference

  webapp:
    build: ./webapp
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_MONITOR_WS_URL=ws://localhost:8001/ws
      - NEXT_PUBLIC_MONITOR_API_URL=http://localhost:8001
      - NEXT_PUBLIC_MAPBOX_TOKEN=${MAPBOX_ACCESS_TOKEN}
    depends_on:
      - monitor

volumes:
  hf_cache:
  dashboard_db:
